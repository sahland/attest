# Shared, library-grade analysis configuration for the whole workspace.
# Individual packages include this file and may relax specific rules.
include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # Documentation gaps are a hard error on the published packages.
    public_member_api_docs: error
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.mocks.dart"

linter:
  rules:
    - public_member_api_docs
    - require_trailing_commas
    - prefer_single_quotes
    - directives_ordering
    - always_declare_return_types
    - prefer_relative_imports
    - unawaited_futures
    - avoid_redundant_argument_values
    - cascade_invocations
    - prefer_const_constructors
    - prefer_const_declarations
    - prefer_final_locals
    - sort_pub_dependencies
    - unnecessary_lambdas
    - use_super_parameters
