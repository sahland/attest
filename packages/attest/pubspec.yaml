name: attest
description: >-
  Continuous accessibility-compliance engine for Flutter. Pure-Dart rules that
  map findings to WCAG and EN 301 549 success criteria, with CI baseline gating.
version: 1.2.0
repository: https://github.com/sahland/attest
issue_tracker: https://github.com/sahland/attest/issues
homepage: https://github.com/sahland/attest
topics:
  - accessibility
  - a11y
  - wcag
  - testing

# The code itself needs nothing newer than the Dart 3.0 class modifiers; the
# 3.6 floor is the lowest bound the pub-workspace tooling permits, and is
# verified by the analyzer running at language version 3.6.
environment:
  sdk: ^3.6.0

resolution: workspace

dependencies:
  collection: ^1.19.0
  meta: ^1.16.0

dev_dependencies:
  flutter_lints: ^6.0.0
  test: ^1.31.0
