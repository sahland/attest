name: a11y_audit_cli
description: >-
  Command-line companion for a11y_audit: aggregate widget-test reports, diff a
  CI baseline by fingerprint, and emit JSON, SARIF and HTML output.
version: 0.1.0
repository: https://github.com/a11y-audit/a11y_audit
issue_tracker: https://github.com/a11y-audit/a11y_audit/issues
homepage: https://github.com/a11y-audit/a11y_audit
topics:
  - accessibility
  - a11y
  - wcag
  - testing

environment:
  sdk: ^3.6.0

resolution: workspace

executables:
  a11y_audit:

dependencies:
  a11y_audit: ^0.1.0
  args: ^2.6.0
  path: ^1.9.0

dev_dependencies:
  flutter_lints: ^6.0.0
  test: ^1.31.0
