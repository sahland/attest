name: attest_cli
description: >-
  Command-line companion for attest: aggregate widget-test reports, diff a CI
  baseline by fingerprint, and emit JSON, SARIF and HTML output.
version: 1.6.0
repository: https://github.com/sahland/attest
issue_tracker: https://github.com/sahland/attest/issues
homepage: https://github.com/sahland/attest
topics:
  - accessibility
  - a11y
  - wcag
  - testing

# Same floor as the attest core: nothing in the code needs more than Dart 3.x
# basics; 3.6 is the lowest bound the pub-workspace tooling permits.
environment:
  sdk: ^3.6.0

resolution: workspace

executables:
  attest:

dependencies:
  args: ^2.6.0
  attest: ^1.11.0
  meta: ^1.16.0
  path: ^1.9.0

dev_dependencies:
  flutter_lints: ^6.0.0
  test: ^1.31.0
