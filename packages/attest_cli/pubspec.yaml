name: attest_cli
description: >-
  Command-line companion for attest: aggregate widget-test reports, diff a CI
  baseline by fingerprint, and emit JSON, SARIF and HTML output.
version: 0.1.0
repository: https://github.com/sahland/attest
issue_tracker: https://github.com/sahland/attest/issues
homepage: https://github.com/sahland/attest
topics:
  - accessibility
  - a11y
  - wcag
  - testing

environment:
  sdk: ^3.6.0

resolution: workspace

executables:
  attest:

dependencies:
  args: ^2.6.0
  attest: ^0.2.0
  path: ^1.9.0

dev_dependencies:
  flutter_lints: ^6.0.0
  test: ^1.31.0
