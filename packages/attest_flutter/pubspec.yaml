name: attest_flutter
description: >-
  Flutter widget-test integration for attest: a WidgetTester accessibility
  audit, raster and text-scale collectors, and gate matchers for CI.
version: 1.3.0
repository: https://github.com/sahland/attest
issue_tracker: https://github.com/sahland/attest/issues
homepage: https://github.com/sahland/attest
topics:
  - accessibility
  - a11y
  - wcag
  - testing

# Flutter 3.32 introduced the tri-state SemanticsData.flagsCollection API the
# snapshot builder maps; earlier SDKs cannot compile this package. Dart 3.8 is
# the Dart shipped with Flutter 3.32.
environment:
  sdk: ^3.8.0
  flutter: ">=3.32.0"

resolution: workspace

dependencies:
  attest: ^1.9.0
  flutter:
    sdk: flutter
  # flutter_test is a runtime dependency here (not dev): this package *provides*
  # test helpers, so consumers import them from their own test code.
  flutter_test:
    sdk: flutter
  meta: ^1.16.0

dev_dependencies:
  flutter_lints: ^6.0.0
