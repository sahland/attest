  - wcag
  - testing

environment:
  sdk: ^3.6.0

resolution: workspace

dependencies:
  collection: ^1.19.0
  meta: ^1.16.0

dev_dependencies:
  flutter_lints: ^6.0.0
  test: ^1.31.0
